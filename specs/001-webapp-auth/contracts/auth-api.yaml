openapi: 3.1.0
info:
  title: Webapp Authentication API
  version: 1.0.0
  description: >
    Contract for credential authentication, Google SSO completion, authenticated
    profile retrieval, and session logout for the webapp authentication system.
servers:
  - url: https://example.com/api/v1
paths:
  /auth/register:
    post:
      summary: Register a new user with username, email, and password
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created and authenticated session established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid registration input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Account already exists for the submitted email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      summary: Authenticate an existing user with credentials
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "400":
          description: Invalid login input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/google:
    post:
      summary: Complete Google sign-in using a provider-issued identity token
      operationId: loginWithGoogle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleAuthRequest"
      responses:
        "200":
          description: Existing account authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "201":
          description: New account created from Google identity and authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSuccessResponse"
        "401":
          description: Google authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Google identity conflicts with an existing account state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      summary: Return the currently authenticated user summary
      operationId: getCurrentUser
      responses:
        "200":
          description: Authenticated user summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummaryResponse"
        "401":
          description: No valid authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      summary: Revoke the current authenticated session
      operationId: logoutUser
      responses:
        "204":
          description: Session revoked successfully
        "401":
          description: No valid authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/me:
    get:
      summary: Retrieve protected dashboard profile data
      operationId: getProfile
      responses:
        "200":
          description: Protected user profile summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSummaryResponse"
        "401":
          description: No valid authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    GoogleAuthRequest:
      type: object
      required:
        - idToken
      properties:
        idToken:
          type: string
          minLength: 1
    AuthSuccessResponse:
      type: object
      required:
        - user
        - redirectTo
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
        redirectTo:
          type: string
          description: Protected post-authentication destination
    UserSummaryResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/UserSummary"
    UserSummary:
      type: object
      required:
        - id
        - username
        - email
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
